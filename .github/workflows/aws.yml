name: Delta Stars Sovereign Clean Run 🚀

on:
  push:
    branches: [ "main" ]

jobs:
  # مهمة التنظيف والبناء الشامل
  sovereign-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Force Clean & Install
        run: |
          npm cache clean --force
          npm install --legacy-peer-deps

      - name: Final Production Build
        run: npm run build
        env:
          VITE_BRAND: "نجوم دلتا للتجارة"
          VITE_LOCATION: "جدة - شارع المنار"

      - name: Notify Success
        run: echo "Project Cleaned and Sovereign Update Applied ✅"
